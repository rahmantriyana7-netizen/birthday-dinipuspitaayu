<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  color: white;
}

.container {
  margin-top: 120px;
}

button {
  padding: 15px 35px;
  font-size: 20px;
  border: none;
  border-radius: 12px;
  background: white;
  color: #ff6b81;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

#ucapan {
  display: none;
}

h1 {
  font-size: 55px;
  margin-top: 40px;
}

p {
  font-size: 22px;
}

img {
  width: 250px;
  margin-top: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="container">

  <h2>Hai kamu 🎉</h2>
  <button onclick="buka()">Klik untuk membuka</button>

  <div id="ucapan">
    <h1>Happy Birthday 🎂</h1>
    <p>Semoga panjang umur, sehat selalu, dan semua keinginan kamu tercapai ❤️</p>

    <!-- FOTO AKAN MUNCUL DI SINI -->
    <img src="foto.jpg">

  </div>

</div>

<!-- MUSIK OTOMATIS SAAT DIKLIK -->
<audio id="musik" src="musik.mp3"></audio>

<script>
function buka() {
  document.getElementById("ucapan").style.display = "block";
  document.getElementById("musik").play();
}
</script>

</body>
</html>
